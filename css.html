<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bienvenido a CSS</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
}

/* Encabezado */
header{
  padding: 30px;
}

/* NAV a la izquierda (sin fondo) */
nav{
  text-align: left;
  padding: 10px 20px;
}

nav a{
  display: inline-block;
  margin-right: 15px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

/* Contenido */
main{
  margin: 40px auto;
  width: 60%;
}

/* Footer en cuadro azul */
footer{
  background-color: #003366;
  color: white;
  padding: 15px;
  margin-top: 40px;
}
</style>

</head>
<body>

<header>
  <h1>Bienvenido a CSS</h1>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Nosotros</a>
  <a href="#">Contactos</a>
</nav>

<main>
  <p>Esta página CSS muestra la apariencia visual del contenido HTML.</p>
</main>

<footer>
  <p>Instituto Tecnotronic - 2026</p>
</footer>

</body>
</html>
